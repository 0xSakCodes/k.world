<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K World 🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

    <link href="./index.css" rel="stylesheet">
  </head>
  <body>
    <header>
      <h1>😺 Kitty World 😺</h1>
    </header>

    <section class="kitty-gallery">
      <!-- Normal Kitty -->
      <div class="kitty-card" onclick="petKitty(this, 'normal')">
        <img src="https://raw.githubusercontent.com/0xSakCodes/k.world/refs/heads/main/files/normal-kit.gif" alt="Cute Kitty">
        <h3>Fluffie</h3>
        <p>Meet Fluffie!! Fluffie Loves Chasing Butterflies! 🦋</p>
      </div>

      <!-- Shy Kitty -->
      <div class="kitty-card" onclick="petKitty(this, 'shy')">
        <img src="https://raw.githubusercontent.com/0xSakCodes/k.world/refs/heads/main/files/shy-kit.gif" alt="Shy Kitty">
        <h3>Skitty</h3>
        <p>Skitty, is a shy kitty :>, and tries to avoid social interaction, tap carefully! 😶‍🌫️</p>
      </div>

      <!-- Furious Kitty -->
      <div class="kitty-card" onclick="petKitty(this, 'furious')">
        <img src="https://raw.githubusercontent.com/0xSakCodes/k.world/refs/heads/main/files/devil-kit.gif", alt="Angry Kitty">
        <h3>Alpie</h3>
        <p>Meet Alpie (Risk Taker:), Wanna Try Your Luck? 🐾</p>
      </div>
    </section>

    <footer>
      🐾 Thanks for visiting - 0xSakCodes :) 🐾
    </footer>
    <script src="index.js"></script>
  </body>
</html>
